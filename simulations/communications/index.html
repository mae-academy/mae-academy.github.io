    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LayoutGrid = (props) => (

        const ArrowLeft = (props) => (

        );
        const ArrowUpRight = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
        );
        const Settings = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const Activity = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        );
        const ChevronDown = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        );

        // --- CONSTANTS & TYPES ---
        const EncodingType = {
            NRZ_L: 'nrz_l',
            NRZ_I: 'nrz_i',
            UNIPOLAR: 'unipolar',
            POLAR_NRZ: 'polar_nrz',
            AMI: 'ami',
            MANCHESTER: 'manchester',
            DIFF_MANCHESTER: 'diff_manchester',
            B8ZS: 'b8zs',
            HDB3: 'hdb3',
        };

        // --- LOGIC: Signal Encoding (FIXED) ---
        function encodeSignal(bitsStr, voltage, type) {
            const bits = bitsStr.split('').map(b => parseInt(b));
            const data = [];
            let transitions = 0;
            
            let currentLevel = voltage;
            let lastNonZero = -voltage; // Default previous pulse for AMI/B8ZS/HDB3
            let hdb3PulseCount = 0; // Pulses since last substitution

            // Initial state for differential methods
            if (type === EncodingType.NRZ_I || type === EncodingType.DIFF_MANCHESTER) {
                currentLevel = voltage;
            }

            for (let i = 0; i < bits.length; i++) {
                const bit = bits[i];
                const t = i;

                // --- SCRAMBLING LOGIC (B8ZS & HDB3) ---
                
                // B8ZS: Check for 8 consecutive zeros
                if (type === EncodingType.B8ZS && bit === 0 && bits.slice(i, i + 8).join('') === '00000000') {
                    // Pattern: 0 0 0 V B 0 V B
                    const v = lastNonZero;      // Violation (same as last)
                    const b = -lastNonZero;     // Bipolar (opposite)
                    
                    // 0 0 0
                    data.push({x: t, y: 0});
                    data.push({x: t+1, y: 0});
                    data.push({x: t+2, y: 0});
                    // V
                    data.push({x: t+3, y: v});
                    // B
                    data.push({x: t+4, y: b});
                    lastNonZero = b; // Update valid pulse
                    // 0
                    data.push({x: t+5, y: 0});
                    // V
                    data.push({x: t+6, y: -lastNonZero}); // Violation relative to new lastNonZero? No, V follows B logic of scrambling.
                                                           // Standard B8ZS: The second V is same polarity as previous pulse (which was B).
                                                           // Actually, let's stick to standard definition: 000VB0VB relative to *original* lastNonZero.
                                                           // If last was +, V is +, B is -. Next V is -, B is +.
                    
                    // Let's do it cleanly based on current lastNonZero state entering the block
                    // We already set v = lastNonZero.
                    // The sequence is: 0, 0, 0, V(v), B(-v), 0, V(-v), B(v)
                    
                    // We did 0,0,0,V,B.
                    // Next is 0
                    // Next is V (same polarity as previous pulse, which was B=-v). So V2 = -v.
                    data.push({x: t+6, y: -v});
                    // Next is B (opposite to V2). B2 = v.
                    data.push({x: t+7, y: v});
                    
                    lastNonZero = v; // The last pulse was 'v'

                    i += 7; 
                    continue;
                }

                // HDB3: Check for 4 consecutive zeros
                if (type === EncodingType.HDB3 && bit === 0 && bits.slice(i, i + 4).join('') === '0000') {
                    // Check pulses since last substitution
                    // If odd: 000V. If even: B00V.
                    
                    if (hdb3PulseCount % 2 !== 0) {
                        // Odd: 0 0 0 V
                        data.push({x: t, y: 0});
                        data.push({x: t+1, y: 0});
                        data.push({x: t+2, y: 0});
                        
                        const v = lastNonZero; // Violation = same as last pulse
                        data.push({x: t+3, y: v});
                        
                        lastNonZero = v;
                        hdb3PulseCount = 0; // Reset
                    } else {
                        // Even: B 0 0 V
                        const b = -lastNonZero; // Bipolar = opposite
                        data.push({x: t, y: b});
                        lastNonZero = b; // update reference
                        
                        data.push({x: t+1, y: 0});
                        data.push({x: t+2, y: 0});
                        
                        const v = lastNonZero; // Violation = same as last (which is b)
                        data.push({x: t+3, y: v});
                        
                        lastNonZero = v;
                        hdb3PulseCount = 0; // Reset
                    }
                    
                    i += 3;
                    continue;
                }

                // --- STANDARD LOGIC ---
                switch (type) {
                    case EncodingType.UNIPOLAR:
                        data.push({x: t, y: bit ? voltage : 0});
                        break;
                    case EncodingType.NRZ_L:
                        data.push({x: t, y: bit === 0 ? voltage : -voltage});
                        break;
                    case EncodingType.NRZ_I:
                        if (bit === 1) currentLevel = -currentLevel;
                        data.push({x: t, y: currentLevel});
                        break;
                    case EncodingType.POLAR_NRZ:
                        data.push({x: t, y: bit === 1 ? voltage : -voltage});
                        break;
                    case EncodingType.AMI:
                    case EncodingType.B8ZS: // Fallback
                    case EncodingType.HDB3: // Fallback
                        if (bit === 0) {
                            data.push({x: t, y: 0});
                        } else {
                            lastNonZero = -lastNonZero;
                            data.push({x: t, y: lastNonZero});
                            hdb3PulseCount++;
                        }
                        break;
                    case EncodingType.MANCHESTER:
                        data.push({x: t, y: bit === 0 ? voltage : -voltage});
                        data.push({x: t + 0.5, y: bit === 0 ? -voltage : voltage});
                        break;
                    case EncodingType.DIFF_MANCHESTER:
                        if (bit === 0) currentLevel = -currentLevel;
                        data.push({x: t, y: currentLevel});
                        currentLevel = -currentLevel;
                        data.push({x: t + 0.5, y: currentLevel});
                        break;
                    default:
                        data.push({x: t, y: bit ? voltage : 0});
                }
            }

            // Extend last point to end of period
            if (data.length > 0) {
                data.push({x: bits.length, y: data[data.length - 1].y});
            }

            // Calc Transitions
            for (let i = 1; i < data.length; i++) {
                if (data[i].y !== data[i-1].y) transitions++;
            }

            return { labels: [], signal: data, processedBits: bitsStr, transitions };
        }

        // --- COMPONENTS ---

        const Header = () => (
            <header className="sticky top-0 z-50 bg-[#eaf2ff]/85 backdrop-blur-md border-b border-[#09102a]/15">
                <div className="w-[min(1200px,92%)] mx-auto flex items-center justify-between py-3.5 gap-3.5">
                    <a href="#" className="flex items-center gap-3 min-w-[220px] group text-inherit no-underline">
                        <div className="relative w-11 h-11 rounded-2xl overflow-hidden grid place-items-center shadow-[0_14px_30px_rgba(63,111,255,0.18)]">
                            <div className="absolute inset-0 bg-[conic-gradient(from_220deg,var(--tw-gradient-stops))] from-brand via-brand2 to-brand"></div>
                            <div className="absolute inset-[-60%] bg-[radial-gradient(circle_at_35%_35%,rgba(255,255,255,0.75),transparent_55%)] animate-shimmer z-10"></div>
                            <LayoutGrid className="relative z-20 text-white w-6 h-6" />
                        </div>
                        <div>
                            <h1 className="m-0 text-[15px] leading-[1.2] font-bold text-text">MAE Academy</h1>
                            <p className="m-0 text-xs text-muted font-normal">Digital Transmission</p>
                        </div>
                    </a>
                    <div className="flex gap-2.5 items-center">
                        <button className="hidden sm:inline-flex items-center gap-2 px-3.5 py-3 border border-border bg-white/70 text-text rounded-2xl cursor-pointer font-black text-sm transition-all hover:-translate-y-[1px] hover:shadow-lg">
                            <ArrowLeft className="w-4 h-4" />
                            Back to Hub
                        </button>
                        <a href="#start" className="inline-flex items-center gap-2 px-3.5 py-3 border-none bg-gradient-to-br from-[#08b58d] to-[#3f6fff] text-[#06101a] rounded-2xl cursor-pointer font-black text-sm transition-all hover:-translate-y-[1px] hover:shadow-lg shadow-sm">
                            Simulate
                            <ArrowUpRight className="w-4 h-4" />
                        </a>
                    </div>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="border-t border-border bg-white/35 py-7 pb-10 text-muted mt-auto">
                <div className="w-[min(1200px,92%)] mx-auto flex flex-wrap justify-between items-center gap-3">
                    <div className="text-sm font-semibold">
                        © <span id="year">{new Date().getFullYear()}</span> MAE Academy — All rights reserved
                    </div>
                    <div className="flex gap-2.5 flex-wrap">
                        <span className="px-3.5 py-2.5 border border-border bg-white/70 text-text rounded-2xl text-xs font-bold">Home</span>
                        <span className="px-3.5 py-2.5 border border-border bg-white/70 text-text rounded-2xl text-xs font-bold">Sim Hub</span>
                    </div>
                </div>
            </footer>
        );

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [mounted, setMounted] = useState(false);
            const [bits, setBits] = useState("01011011");
            const [encoding, setEncoding] = useState("nrz_l");
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const [stats, setStats] = useState({ transitions: 0, levels: 2, dc: "None" });

            useEffect(() => {
                setMounted(true);
            }, []);

            useEffect(() => {
                if (!chartRef.current) return;

                const voltage = 5;
                const rawBits = bits.replace(/[^01]/g, '') || '0';
                const result = encodeSignal(rawBits, voltage, encoding);

                // Update Stats
                const sum = result.signal.reduce((a, b) => a + b.y, 0);
                const avg = sum / result.signal.length;
                let levels = 2;
                if (['ami', 'b8zs', 'hdb3', 'mlt_3'].includes(encoding)) levels = 3;

                setStats({
                    transitions: result.transitions,
                    levels: levels,
                    dc: Math.abs(avg) < 0.1 ? "Zero" : (avg > 0 ? "+ Positive" : "- Negative")
                });

                // Destroy old
                if (chartInstance.current) chartInstance.current.destroy();

                // Textbook Plugin for Grid
                const textbookPlugin = {
                    id: 'textbookPlugin',
                    afterDraw: (chart) => {
                        const { ctx, chartArea, scales } = chart;
                        const x = scales.x;
                        const bitsArr = result.processedBits;
                        
                        ctx.save();
                        ctx.strokeStyle = 'rgba(9,16,42,0.1)';
                        ctx.lineWidth = 1;
                        ctx.setLineDash([5, 5]);

                        for (let i = 0; i <= bitsArr.length; i++) {
                            const xPos = x.getPixelForValue(i);
                            if (xPos >= chartArea.left && xPos <= chartArea.right) {
                                ctx.beginPath();
                                ctx.moveTo(xPos, chartArea.top - 20);
                                ctx.lineTo(xPos, chartArea.bottom);
                                ctx.stroke();
                            }
                        }

                        ctx.setLineDash([]);
                        ctx.fillStyle = '#4c5d88';
                        ctx.font = 'bold 14px "Apple Gothic", sans-serif';
                        ctx.textAlign = 'center';
                        for (let i = 0; i < bitsArr.length; i++) {
                            const xPos = x.getPixelForValue(i + 0.5);
                            if (xPos >= chartArea.left && xPos <= chartArea.right) {
                                ctx.fillText(bitsArr[i], xPos, chartArea.top - 10);
                            }
                        }
                        ctx.restore();
                    }
                };

                // Create Chart
                chartInstance.current = new Chart(chartRef.current, {
                    type: 'line',
                    data: {
                        datasets: [{
                            data: result.signal,
                            borderColor: '#3f6fff',
                            borderWidth: 3,
                            pointRadius: 0,
                            stepped: 'before',
                            tension: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: { top: 40, right: 20, left: 10, bottom: 10 } },
                        scales: {
                            x: {
                                type: 'linear',
                                min: 0,
                                max: rawBits.length,
                                grid: { display: false },
                                ticks: { display: false },
                                border: { display: false }
                            },
                            y: {
                                min: -voltage - 1.5,
                                max: voltage + 1.5,
                                grid: { display: false },
                                border: { display: false },
                                ticks: {
                                    callback: function(val) {
                                        if (Math.abs(val - voltage) < 0.1) return '+V';
                                        if (Math.abs(val) < 0.1) return '0V';
                                        if (Math.abs(val + voltage) < 0.1) return '-V';
                                        return '';
                                    },
                                    font: { weight: 'bold', size: 12 },
                                    color: '#4c5d88',
                                    padding: 10
                                }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false },
                        },
                        animation: { duration: 0 }
                    },
                    plugins: [textbookPlugin]
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [bits, encoding]);

            return (
                <div className={`min-h-screen flex flex-col font-sans transition-opacity duration-500 ${mounted ? 'opacity-100' : 'opacity-0'}`}>
                    {/* Background */}
                    <div className="fixed inset-0 pointer-events-none -z-10 bg-gradient-to-b from-bg to-bg2 overflow-hidden">
                        <div className="absolute top-[-10%] left-[15%] w-[900px] h-[520px] rounded-full bg-brand2/20 blur-[3em]" />
                        <div className="absolute top-[0%] right-[86%] sm:right-[14%] w-[900px] h-[520px] rounded-full bg-brand/18 blur-[3em]" />
                    </div>

                    <Header />

                    <main className="py-11 pb-[70px] flex-grow">
                        <div className="w-[min(1200px,92%)] mx-auto">
                            
                            {/* Notification Pill */}
                            <div className="inline-flex items-center gap-2.5 border border-border bg-white/65 px-3 py-2 rounded-full text-muted font-bold text-[13px] w-fit">
                                <span className="w-2.5 h-2.5 rounded-full bg-gradient-to-br from-brand to-brand2 shadow-[0_0_0_6px_rgba(63,111,255,0.12)] animate-pulseCustom"></span>
                                <span>Sim: Chart.js</span>
                            </div>

                            {/* Heading */}
                            <div className="flex justify-between items-end gap-4 mt-[18px] mb-[18px] flex-wrap">
                                <div>
                                    <h2 className="m-0 text-[42px] lg:text-[52px] tracking-tight leading-[1.05] font-bold text-text">
                                        Digital Transmission
                                    </h2>
                                    <p className="mt-2.5 mb-0 text-muted font-semibold leading-[1.8] max-w-[70ch]">
                                        Interactive Line Coding Simulator. Configure the binary input and encoding scheme to visualize signal changes, including B8ZS and HDB3 scrambling.
                                    </p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-[350px_1fr] gap-6 mt-8">
                                
                                {/* LEFT: Config */}
                                <div className="glass-panel rounded-[22px] p-6 shadow-[0_12px_30px_rgba(16,24,40,0.08)] relative overflow-hidden h-fit">
                                   <div className="absolute inset-[-2px] opacity-80 z-0 pointer-events-none bg-[radial-gradient(520px_220px_at_70%_10%,rgba(8,181,141,0.14),transparent_60%)]"></div>
                                   
                                   <div className="relative z-10">
                                      <div className="flex items-center gap-3 mb-6">
                                        <div className="w-10 h-10 rounded-xl grid place-items-center bg-gradient-to-br from-brand/15 to-brand2/15 border border-border font-black text-lg">
                                          <Settings className="w-5 h-5 text-brand2" />
                                        </div>
                                        <h3 className="m-0 text-lg font-bold text-text">Configuration</h3>
                                      </div>

                                      <div className="space-y-5">
                                        <div>
                                          <label className="block text-xs font-extrabold text-muted uppercase tracking-wider mb-2">Binary Sequence</label>
                                          <input 
                                            type="text" 
                                            value={bits}
                                            onChange={(e) => setBits(e.target.value)}
                                            className="w-full bg-white/70 border border-border rounded-xl px-4 py-3 text-sm font-mono text-text focus:outline-none focus:border-brand2/50 focus:ring-2 focus:ring-brand2/10 transition-all"
                                            placeholder="010110..."
                                          />
                                        </div>

                                        <div>
                                          <label className="block text-xs font-extrabold text-muted uppercase tracking-wider mb-2">Encoding Scheme</label>
                                          <div className="relative">
                                            <select 
                                              value={encoding}
                                              onChange={(e) => setEncoding(e.target.value)}
                                              className="w-full appearance-none bg-white/70 border border-border rounded-xl px-4 py-3 text-sm font-bold text-text focus:outline-none focus:border-brand2/50 focus:ring-2 focus:ring-brand2/10 transition-all"
                                            >
                                                <optgroup label="Core Methods">
                                                    <option value="nrz_l">NRZ-L</option>
                                                    <option value="nrz_i">NRZ-I</option>
                                                    <option value="unipolar">Unipolar</option>
                                                    <option value="polar_nrz">Polar NRZ</option>
                                                    <option value="ami">AMI</option>
                                                    <option value="manchester">Manchester</option>
                                                    <option value="diff_manchester">Diff. Manchester</option>
                                                </optgroup>
                                                <optgroup label="Scrambling (Long Zeros)">
                                                    <option value="b8zs">B8ZS</option>
                                                    <option value="hdb3">HDB3</option>
                                                </optgroup>
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-muted">
                                                <ChevronDown className="w-4 h-4" />
                                            </div>
                                          </div>
                                        </div>

                                        <div className="pt-2">
                                           <label className="block text-xs font-extrabold text-muted uppercase tracking-wider mb-2">Presets</label>
                                           <div className="grid grid-cols-4 gap-2">
                                              {[
                                                  {l: 'Typical', v:'01011011'}, 
                                                  {l: 'Zeros', v:'0000000000'}, 
                                                  {l: 'Ones', v:'11111111'}, 
                                                  {l: 'HDB3', v:'100000000'}
                                              ].map((p, i) => (
                                                <button 
                                                  key={i}
                                                  onClick={() => setBits(p.v)}
                                                  className="px-2 py-2 rounded-lg border border-border bg-white/50 text-[10px] font-bold text-muted hover:bg-brand2/10 hover:text-brand2 hover:border-brand2/20 transition-all truncate"
                                                >
                                                  {p.l}
                                                </button>
                                              ))}
                                           </div>
                                        </div>

                                        <hr className="border-border my-2" />

                                        <div>
                                          <label className="block text-xs font-extrabold text-muted uppercase tracking-wider mb-3">Analysis</label>
                                          <div className="space-y-3">
                                            <div className="flex justify-between items-center text-sm">
                                              <span className="text-muted font-semibold">Transitions</span>
                                              <span className="font-mono font-bold text-text bg-white/50 px-2 py-1 rounded border border-border">{stats.transitions}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-sm">
                                              <span className="text-muted font-semibold">Voltage Levels</span>
                                              <span className="font-mono font-bold text-text bg-white/50 px-2 py-1 rounded border border-border">{stats.levels}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-sm">
                                              <span className="text-muted font-semibold">DC Component</span>
                                              <span className={`font-mono font-bold text-[11px] px-2 py-1 rounded border border-border ${stats.dc === "Zero" ? 'text-green-600 bg-green-50' : 'text-amber-600 bg-amber-50'}`}>{stats.dc}</span>
                                            </div>
                                          </div>
                                        </div>
                                      </div>
                                   </div>
                                </div>

                                {/* RIGHT: Chart */}
                                <div className="glass-panel rounded-[22px] p-6 shadow-[0_12px_30px_rgba(16,24,40,0.08)] relative overflow-hidden flex flex-col min-h-[400px]">
                                   <div className="absolute inset-[-2px] opacity-80 z-0 pointer-events-none bg-[radial-gradient(520px_240px_at_20%_70%,rgba(63,111,255,0.14),transparent_60%)]"></div>

                                   <div className="relative z-10 flex flex-col flex-grow">
                                      <div className="flex justify-between items-center mb-6">
                                        <div className="flex items-center gap-3">
                                          <div className="w-10 h-10 rounded-xl grid place-items-center bg-gradient-to-br from-brand/15 to-brand2/15 border border-border font-black text-lg">
                                            <Activity className="w-5 h-5 text-brand" />
                                          </div>
                                          <div>
                                            <h3 className="m-0 text-lg font-bold text-text">Oscilloscope</h3>
                                            <p className="m-0 text-xs text-muted font-semibold">Signal Output</p>
                                          </div>
                                        </div>
                                        <div className="hidden sm:flex gap-2">
                                           <span className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white/60 border border-border text-[11px] font-bold text-muted">
                                             <div className="w-2 h-2 rounded-full bg-brand2"></div> Output
                                           </span>
                                        </div>
                                      </div>

                                      <div className="flex-grow w-full relative min-h-[300px] bg-white/40 rounded-xl border border-border p-2">
                                        <canvas ref={chartRef}></canvas>
                                      </div>
                                   </div>
                                </div>

                            </div>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        };

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
