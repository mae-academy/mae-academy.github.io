
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAE Academy — Digital Transmission</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eaf2ff;
      --bg2: #f8fbff;
      --card: #ffffff;
      --text: #09102a;
      --muted: #4c5d88;
      --brand: #08b58d;
      --brand2: #3f6fff;
      --danger: #d32f2f;
      --border: rgba(9,16,42,.14);
      --shadow: 0 22px 60px rgba(16,24,40,.12);
      --radius: 22px;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 520px at 15% -10%, rgba(63,111,255,.20), transparent 55%),
        radial-gradient(900px 520px at 86% 0%, rgba(8,181,141,.18), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height: 100vh;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    @keyframes shimmer {
      0%, 100% { transform: translate(12%, 12%) rotate(0deg); }
      50% { transform: translate(-12%, -12%) rotate(25deg); }
    }

    .logo-shimmer::after {
      content: "";
      position: absolute;
      inset: -60%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.75), transparent 55%);
      animation: shimmer 5.6s ease-in-out infinite;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "chart.js": "https://esm.sh/chart.js@^4.5.1",
    "react-chartjs-2": "https://esm.sh/react-chartjs-2@^5.3.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
