<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Transmission — MAE Academy</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon-16.svg">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --panel2: #f2f6ff;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #51607a;
            --border: rgba(15,23,42,.12);
            --accent: #2563eb;
            --good: #16a34a;
            --warn: #f59e0b;
            --bad: #ef4444;
            --shadow: 0 10px 25px rgba(2,8,23,.08);
            --radius: 16px;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
            --sans: system-ui,-apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
        }

        *{box-sizing:border-box}
        body{
            margin:0;
            font-family:var(--sans);
            background: radial-gradient(1200px 500px at 20% 0%, rgba(37,99,235,.10), transparent 55%),
                        radial-gradient(900px 450px at 90% 10%, rgba(22,163,74,.10), transparent 55%),
                        var(--bg);
            color:var(--text);
        }

        /* Header */
        header{
            position:sticky; top:0; z-index:10;
            backdrop-filter: blur(10px);
            background: rgba(246,248,252,.72);
            border-bottom:1px solid var(--border);
        }
        .wrap{max-width:1200px; margin:0 auto; padding:16px 18px;}
        .brand{
            display:flex; align-items:center; justify-content:space-between; gap:12px;
        }
        .logo{
            display:flex; align-items:center; gap:12px; text-decoration: none; color: inherit;
        }
        .badge{
            width:40px; height:40px; border-radius:12px;
            background: linear-gradient(135deg, rgba(37,99,235,.16), rgba(22,163,74,.14));
            border:1px solid var(--border);
            box-shadow: var(--shadow);
            display:grid; place-items:center;
            font-weight:900;
            color:var(--accent);
        }
        h1{font-size:18px; margin:0; letter-spacing:.2px;}
        .sub{color:var(--muted); font-size:12px; margin-top:2px;}
        .topRight{
            display:flex; gap:8px; align-items:center; flex-wrap:wrap;
            color:var(--muted);
            font-size:12px;
        }
        .pill{
            padding:8px 10px; border-radius:999px;
            background:var(--panel);
            border:1px solid var(--border);
            box-shadow: 0 6px 18px rgba(2,8,23,.05);
            display:flex; gap:8px; align-items:center;
        }

        /* Main */
        .main{
            max-width:1200px; margin:0 auto; padding:18px;
            display:grid; gap:16px;
            grid-template-columns: 330px 1fr;
        }
        @media (max-width: 980px){
            .main{grid-template-columns: 1fr;}
        }

        /* Cards */
        .card{
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card h2{
            margin:0;
            padding:14px 14px 10px 14px;
            font-size:14px;
            border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
        }
        .card h2 small{color:var(--muted); font-weight:600; font-size:12px;}
        .pad{padding:14px;}

        /* Chart Area */
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        /* Controls */
        .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
        label{font-size:12px; color:var(--muted); font-weight:700; display:block; margin-bottom:4px;}
        
        input[type="text"], select{
            border:1px solid var(--border);
            background:var(--panel);
            color:var(--text);
            border-radius:12px;
            padding:10px 10px;
            font-size:13px;
            outline:none;
            width: 100%;
            font-family: var(--mono);
        }
        select { font-family: var(--sans); }
        
        button{
            border:1px solid var(--border);
            background: linear-gradient(180deg, #ffffff, #f7f9ff);
            color:var(--text);
            padding:10px 12px;
            border-radius:12px;
            cursor:pointer;
            font-weight:800;
            font-size:13px;
            transition:.15s ease;
            width: 100%;
        }
        button:hover{transform: translateY(-1px); box-shadow: 0 10px 18px rgba(2,8,23,.08);}
        .primary{
            border-color: rgba(37,99,235,.35);
            background: linear-gradient(180deg, rgba(37,99,235,.12), rgba(37,99,235,.06));
            color: #0b2a7a;
        }
        
        .divider{height:1px; background:var(--border); margin:16px 0;}

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .stat-label { color: var(--muted); }
        .stat-val { font-weight: 700; font-family: var(--mono); }
        .mono { font-family: var(--mono); }
    </style>
</head>
<body>

<header>
    <div class="wrap">
        <div class="brand">
            <a href="../../" class="logo">
                <div class="badge">DT</div>
                <div>
                    <h1>Digital Transmission</h1>
                    <div class="sub">Line Coding • Signal Analysis • Bandwidth</div>
                </div>
            </a>
            <div class="topRight">
                <div class="pill"><span>Sim:</span><span class="mono">Chart.js</span></div>
            </div>
        </div>
    </div>
</header>

<div class="main">
    <!-- LEFT: Controls -->
    <div class="card">
        <h2>Configuration <small>Input & Settings</small></h2>
        <div class="pad">
            
            <div style="margin-bottom: 16px;">
                <label>Binary Sequence</label>
                <input type="text" id="bitsInput" value="01011011" placeholder="010110...">
            </div>

            <div style="margin-bottom: 16px;">
                <label>Encoding Scheme</label>
                <select id="encodingSelect">
                    <optgroup label="Core Methods">
                        <option value="nrz_l">NRZ-L</option>
                        <option value="nrz_i">NRZ-I</option>
                        <option value="unipolar">Unipolar</option>
                        <option value="polar_nrz">Polar NRZ</option>
                        <option value="ami">AMI</option>
                        <option value="manchester">Manchester</option>
                        <option value="diff_manchester">Diff. Manchester</option>
                    </optgroup>
                    <optgroup label="Advanced">
                        <option value="b8zs">B8ZS (AMI Scrambled)</option>
                        <option value="hdb3">HDB3 (AMI Scrambled)</option>
                        <option value="mlt_3">MLT-3</option>
                        <option value="2b1q">2B1Q</option>
                        <option value="4d_pam5">4D-PAM5</option>
                    </optgroup>
                </select>
            </div>

            <button class="primary" id="refreshBtn">Update Waveform</button>

            <div class="divider"></div>

            <label>Presets</label>
            <div class="row">
                <button onclick="setParams('01011011')">Typical</button>
                <button onclick="setParams('00000000')">Zeros</button>
                <button onclick="setParams('11111111')">Ones</button>
                <button onclick="setParams('10101010')">Alt</button>
            </div>

            <div class="divider"></div>

            <label>Analysis</label>
            <div class="stat-row">
                <span class="stat-label">Transitions</span>
                <span class="stat-val" id="transitionCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Levels</span>
                <span class="stat-val" id="levelsCount">2</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">DC Component</span>
                <span class="stat-val" id="dcComp">None</span>
            </div>

        </div>
    </div>

    <!-- RIGHT: Chart -->
    <div class="card">
        <h2>Oscilloscope <small>Signal Output</small></h2>
        <div class="pad">
            <div class="chart-container">
                <canvas id="waveformChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Logic ---
    const EncodingType = {
        NRZ_L: 'nrz_l',
        NRZ_I: 'nrz_i',
        UNIPOLAR: 'unipolar',
        POLAR_NRZ: 'polar_nrz',
        AMI: 'ami',
        MANCHESTER: 'manchester',
        DIFF_MANCHESTER: 'diff_manchester',
        B8ZS: 'b8zs',
        HDB3: 'hdb3',
        TWO_B_ONE_Q: '2b1q',
        MLT_3: 'mlt_3',
        FOUR_D_PAM5: '4d_pam5'
    };

    function encodeSignal(bitsStr, voltage, type) {
        const bits = bitsStr.split('').map(b => parseInt(b));
        const data = [];
        let transitions = 0;
        
        let currentLevel = voltage;
        let lastNonZero = -voltage; // For AMI
        
        // Initial state setup
        if (type === 'nrz-i') currentLevel = voltage; // Assume start High
        if (type === 'diff_manchester') currentLevel = voltage;

        for (let i = 0; i < bits.length; i++) {
            const bit = bits[i];
            const t = i;
            
            switch (type) {
                case 'unipolar':
                    data.push({x: t, y: bit ? voltage : 0});
                    break;
                case 'nrz-l':
                    // 0 -> +V, 1 -> -V
                    data.push({x: t, y: bit === 0 ? voltage : -voltage});
                    break;
                case 'nrz-i':
                    // 1 -> Invert, 0 -> No change
                    if (bit === 1) currentLevel = -currentLevel;
                    data.push({x: t, y: currentLevel});
                    break;
                case 'polar_nrz':
                    // 1 -> +V, 0 -> -V
                    data.push({x: t, y: bit === 1 ? voltage : -voltage});
                    break;
                case 'ami':
                case 'b8zs': // Simplified AMI for now
                case 'hdb3': // Simplified AMI for now
                    // 0 -> 0, 1 -> Alternating
                    if (bit === 0) {
                        data.push({x: t, y: 0});
                    } else {
                        lastNonZero = -lastNonZero;
                        data.push({x: t, y: lastNonZero});
                    }
                    break;
                case 'manchester':
                    // 0: High->Low, 1: Low->High
                    data.push({x: t, y: bit === 0 ? voltage : -voltage});
                    data.push({x: t + 0.5, y: bit === 0 ? -voltage : voltage});
                    break;
                case 'diff-manchester':
                    // 0 -> Transition at start, 1 -> No transition
                    if (bit === 0) currentLevel = -currentLevel;
                    data.push({x: t, y: currentLevel});
                    currentLevel = -currentLevel; // Always transition at mid
                    data.push({x: t + 0.5, y: currentLevel});
                    break;
                default:
                    data.push({x: t, y: bit ? voltage : 0});
            }
        }
        
        // Final point to extend the last level
        if (data.length > 0) {
            data.push({x: bits.length, y: data[data.length - 1].y});
        }

        // Count transitions
        for (let i = 1; i < data.length; i++) {
            if (data[i].y !== data[i-1].y) transitions++;
        }

        return { labels: [], signal: data, processedBits: bitsStr, transitions };
    }

    // Chart.js Plugin for Textbook Style
    const textbookPlugin = {
      id: 'textbookPlugin',
      afterDraw: (chart) => {
        const { ctx, chartArea, scales } = chart;
        const x = scales.x;
        const y = scales.y;
        const bits = chart.config.options.plugins.textbookPlugin.bits || '';
        
        ctx.save();
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);

        // Draw vertical grid lines for bits
        for (let i = 0; i <= bits.length; i++) {
          const xPos = x.getPixelForValue(i);
          if (xPos >= chartArea.left && xPos <= chartArea.right) {
            ctx.beginPath();
            ctx.moveTo(xPos, chartArea.top - 20);
            ctx.lineTo(xPos, chartArea.bottom);
            ctx.stroke();
          }
        }

        // Draw Bit Labels
        ctx.setLineDash([]);
        ctx.fillStyle = '#64748b';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        for (let i = 0; i < bits.length; i++) {
          const xPos = x.getPixelForValue(i + 0.5);
          if (xPos >= chartArea.left && xPos <= chartArea.right) {
            ctx.fillText(bits[i], xPos, chartArea.top - 10);
          }
        }

        // Draw Axes Arrows
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 2;
        
        // Y-axis arrow
        ctx.beginPath();
        ctx.moveTo(chartArea.left, chartArea.bottom + 10);
        ctx.lineTo(chartArea.left, chartArea.top - 30);
        ctx.stroke();
        // Arrowhead Y
        ctx.beginPath();
        ctx.moveTo(chartArea.left - 5, chartArea.top - 25);
        ctx.lineTo(chartArea.left, chartArea.top - 35);
        ctx.lineTo(chartArea.left + 5, chartArea.top - 25);
        ctx.stroke();

        // X-axis arrow
        const yZero = y.getPixelForValue(0) || chartArea.bottom;
        ctx.beginPath();
        ctx.moveTo(chartArea.left - 10, yZero);
        ctx.lineTo(chartArea.right + 20, yZero);
        ctx.stroke();
        // Arrowhead X
        ctx.beginPath();
        ctx.moveTo(chartArea.right + 15, yZero - 5);
        ctx.lineTo(chartArea.right + 25, yZero);
        ctx.lineTo(chartArea.right + 15, yZero + 5);
        ctx.stroke();

        ctx.restore();
      }
    };

    // --- App State & Render ---
    let chartInstance = null;
    const voltage = 5;

    function updateSimulation() {
        const bitsInput = document.getElementById('bitsInput');
        const encodingSelect = document.getElementById('encodingSelect');
        
        // Clean input
        const rawBits = bitsInput.value.replace(/[^01]/g, '');
        if (bitsInput.value !== rawBits) bitsInput.value = rawBits;
        
        const bits = rawBits || '0'; // Fallback
        const type = encodingSelect.value;

        // Run Simulation
        const result = encodeSignal(bits, voltage, type);

        // Update Stats
        document.getElementById('transitionCount').textContent = result.transitions;
        
        // DC Component Estimate
        const sum = result.signal.reduce((a, b) => a + b.y, 0);
        const avg = sum / result.signal.length;
        document.getElementById('dcComp').textContent = Math.abs(avg) < 0.1 ? "Zero" : (avg > 0 ? "+ Positive" : "- Negative");

        // Update Levels Text
        let levels = 2;
        if (type === '2b1q') levels = 4;
        else if (type === '4d_pam5') levels = 5;
        else if (['ami', 'b8zs', 'hdb3', 'mlt_3'].includes(type)) levels = 3;
        document.getElementById('levelsCount').textContent = `${levels} States`;

        // Render Chart
        const ctx = document.getElementById('waveformChart').getContext('2d');
        
        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{
                    data: result.signal,
                    borderColor: '#0083cc',
                    borderWidth: 3,
                    pointRadius: 0,
                    stepped: 'before',
                    tension: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 40, right: 40, left: 20, bottom: 20 } },
                scales: {
                    x: {
                        type: 'linear',
                        min: 0,
                        max: bits.length,
                        grid: { display: false },
                        ticks: { display: false },
                        border: { display: false }
                    },
                    y: {
                        min: -voltage - 1.5,
                        max: voltage + 1.5,
                        grid: { display: false },
                        border: { display: false },
                        ticks: {
                            callback: function(val) {
                                if (Math.abs(val - voltage) < 0.1) return '+V';
                                if (Math.abs(val) < 0.1) return '0V';
                                if (Math.abs(val + voltage) < 0.1) return '-V';
                                return '';
                            },
                            font: { weight: 'bold', size: 12 },
                            color: '#64748b',
                            padding: 10
                        }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false },
                    textbookPlugin: { bits: result.processedBits }
                },
                animation: { duration: 0 }
            },
            plugins: [textbookPlugin]
        });
    }

    // Helpers
    window.setParams = function(bits, type) {
        if (bits !== undefined) document.getElementById('bitsInput').value = bits;
        if (type !== undefined) document.getElementById('encodingSelect').value = type;
        updateSimulation();
    };

    // Event Listeners
    document.getElementById('bitsInput').addEventListener('input', updateSimulation);
    document.getElementById('encodingSelect').addEventListener('change', updateSimulation);
    document.getElementById('refreshBtn').addEventListener('click', updateSimulation);

    // Init
    updateSimulation();
</script>
</body>
</html>
