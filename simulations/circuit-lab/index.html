<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Electric Circuits Laboratory</title>
  <style>
    /* Strict Academic Textbook Aesthetic */
    :root {
      --bg-color: #FFFFFF;
      --text-color: #000000;
      --grid-color: #E5E5E5;
      --highlight: #0055A4; /* Muted academic blue for selections */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Cambria Math', Cambria, serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      border-right: 2px solid var(--text-color);
      display: flex;
      flex-direction: column;
      padding: 10px;
      background: var(--bg-color);
      z-index: 10;
    }

    h2, h3 {
      font-weight: normal;
      border-bottom: 1px solid var(--text-color);
      padding-bottom: 5px;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .component-btn {
      background: none;
      border: 1px solid var(--text-color);
      padding: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 1rem;
      text-align: left;
      transition: background 0.2s;
    }

    .component-btn:hover {
      background: #f0f0f0;
    }

    /* Main Workspace */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #circuitCanvas {
      flex: 1;
      width: 100%;
      cursor: crosshair;
    }

    /* Measurement Panel */
    .measurement-panel {
      height: 250px;
      border-top: 2px solid var(--text-color);
      display: flex;
      padding: 10px;
      gap: 20px;
      background: var(--bg-color);
    }

    .dmm {
      border: 2px solid var(--text-color);
      padding: 10px;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .dmm-display {
      width: 100%;
      height: 60px;
      border: 1px solid var(--text-color);
      background: #fdfdfd;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 5px 10px;
      margin-bottom: 10px;
    }

    .oscilloscope {
      flex: 1;
      border: 2px solid var(--text-color);
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    #oscCanvas {
      flex: 1;
      border: 1px solid var(--text-color);
      background: var(--bg-color);
      margin-top: 10px;
    }

    /* Properties Modal */
    #propertiesModal {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-color);
      border: 2px solid var(--text-color);
      padding: 20px;
      box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
      z-index: 100;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 5px;
      border: 1px solid var(--text-color);
      font-family: 'Cambria Math', serif;
    }
    
    .btn {
      background: var(--text-color);
      color: var(--bg-color);
      border: none;
      padding: 8px 15px;
      cursor: pointer;
      font-family: 'Cambria Math', serif;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Components</h2>
    <button class="component-btn" onclick="app.setTool('Resistor')">Resistor (R)</button>
    <button class="component-btn" onclick="app.setTool('Capacitor')">Capacitor (C)</button>
    <button class="component-btn" onclick="app.setTool('Inductor')">Inductor (L)</button>
    <button class="component-btn" onclick="app.setTool('DC_Source')">DC Voltage Source</button>
    <button class="component-btn" onclick="app.setTool('AC_Source')">Function Generator</button>
    
    <h3 style="margin-top: 20px;">Tools</h3>
    <button class="component-btn" onclick="app.setTool('Wire')">Draw Wire</button>
    <button class="component-btn" onclick="app.setTool('Probe')">Place Probe</button>
  </div>

  <div class="workspace">
    <canvas id="circuitCanvas"></canvas>
    
    <div class="measurement-panel">
      <div class="dmm">
        <h3>Multimeter</h3>
        <div class="dmm-display" id="dmmValue">0.00 V</div>
        <select id="dmmMode" style="width: 100%; padding: 5px; margin-top: auto;">
          <option>Voltage (V)</option>
          <option>Current (A)</option>
          <option>Resistance (Ω)</option>
        </select>
      </div>
      
      <div class="oscilloscope">
        <h3>Oscilloscope (Node Voltage)</h3>
        <canvas id="oscCanvas"></canvas>
      </div>
    </div>
  </div>

  <div id="propertiesModal">
    <h3 id="propTitle">Component Properties</h3>
    <div class="form-group">
      <label id="propLabel">Value:</label>
      <input type="number" id="propInput" step="any">
    </div>
    <button class="btn" onclick="app.saveProperties()">Apply</button>
    <button class="btn" onclick="app.closeProperties()" style="background: #fff; color: #000; border: 1px solid #000;">Cancel</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
