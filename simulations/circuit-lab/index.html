<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MAE Academy — Electric Circuit Lab</title>

  <link rel="icon" type="image/svg+xml" href="../../assets/favicon-16.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="navbar"></div>
  <script>
    fetch('../components/navbar.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('navbar').innerHTML = data;
        const pt = document.getElementById("pageTitle");
        if(pt) pt.textContent = "Virtual Electric Circuits Lab";
      }).catch(e => console.log("Navbar placeholder"));
  </script>

  <main>
    <div class="container builder-layout">
      
      <aside class="builder-sidebar panel">
        <div class="colHead">Components</div>
        <div class="tool-grid">
          <button class="modeBtn" draggable="true" data-type="resistor">Resistor (R)</button>
          <button class="modeBtn" draggable="true" data-type="capacitor">Capacitor (C)</button>
          <button class="modeBtn" draggable="true" data-type="inductor">Inductor (L)</button>
          <button class="modeBtn" draggable="true" data-type="dc-source">DC Source</button>
          <button class="modeBtn" draggable="true" data-type="ac-source">Func Gen</button>
        </div>

        <div class="colHead" style="margin-top: 24px;">Tools</div>
        <div class="tool-grid">
          <button class="modeBtn active" id="tool-wire">Draw Wire</button>
          <button class="modeBtn" id="tool-probe">Place Probe</button>
        </div>
      </aside>

      <section class="builder-workspace panel">
        <div class="panelLabel">
          <span>Schematic Canvas</span>
          <span class="small">Drag components here</span>
        </div>
        <div id="circuit-canvas" class="grid-canvas"></div>
      </section>

      <section class="builder-instruments">
        <div class="panel dmm-panel">
          <div class="panelLabel"><span>Multimeter</span></div>
          <div class="dmm-screen">
            <span class="dmm-val" id="dmm-readout">0.00 V</span>
          </div>
        </div>

        <div class="panel scope-panel">
          <div class="panelLabel"><span>Oscilloscope (Node Voltage)</span></div>
          <div class="chartWrap" style="height: 180px;">
            <canvas id="scopeCanvas"></canvas>
          </div>
        </div>
      </section>

    </div>
  </main>
  
  <div id="footer"></div>
</body>
</html>
