<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MAE Academy — Virtual Circuit Lab</title>
  
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon-16.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --mae-green: #08b58d;
      --mae-blue: #3f6fff;
      --text-main: rgba(9, 16, 42, 0.95);
      --border-color: rgba(9, 16, 42, 0.12);
      --bg-panel: rgba(255, 255, 255, 0.95);
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      margin: 0; padding: 0;
      background-color: #f7f9fa;
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Container to keep lab centered like the template */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header { margin-bottom: 24px; }
    .header h2 { margin: 0; font-size: 40px; font-weight: 900; letter-spacing: -1px; line-height: 1.05;}
    .header p { margin: 8px 0 24px; color: rgba(9,16,42,0.6); font-weight: 800; font-size: 14px;}

    .layout-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      height: 750px;
    }

    /* Workspace */
    .workspace {
      position: relative;
      background: #ffffff;
      border: 1px dashed rgba(9, 16, 42, 0.22);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(16,24,40,0.05);
      background-image: 
        linear-gradient(rgba(9, 16, 42, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(9, 16, 42, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    #wireCanvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; /* Let clicks pass through */
      z-index: 5;
    }

    .wire { stroke: var(--mae-blue); stroke-width: 4; fill: none; stroke-linecap: round; }
    .wire-active { stroke: var(--mae-green); stroke-dasharray: 8 4; animation: dash 1s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -12; } }

    /* Components */
    .component {
      position: absolute;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 10px 20px rgba(16, 24, 40, 0.06);
      cursor: grab;
      user-select: none;
      z-index: 10;
      min-width: 80px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .component:active { cursor: grabbing; z-index: 100; }
    .component.selected { border-color: rgba(63, 111, 255, 0.6); box-shadow: 0 0 0 4px rgba(63,111,255,0.12); }
    
    .c-title { font-weight: 900; font-size: 13px; text-align: center; color: var(--text-main);}
    .c-val { font-weight: 800; font-size: 12px; color: var(--mae-blue); text-align: center; margin-top: 4px; }

    /* Terminals */
    .terminal {
      width: 14px; height: 14px;
      background: #fff;
      border: 3px solid rgba(9,16,42,0.6);
      border-radius: 50%;
      position: absolute;
      cursor: crosshair;
      z-index: 20;
      transition: transform 0.2s, border-color 0.2s;
    }
    .terminal:hover { transform: scale(1.4); border-color: var(--mae-green); }

    /* Sidebar */
    .sidebar {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .sidebar .colHead {
      font-weight: 1000; font-size: 13px; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--text-main);
      border-bottom: 2px solid var(--border-color); padding-bottom: 8px; margin: 0;
    }
    .sidebar label { font-weight: 800; font-size: 12px; display: block; margin-bottom: 6px; color: var(--text-main);}
    .sidebar input {
      width: 100%; padding: 10px 12px; border-radius: 12px;
      border: 1px solid var(--border-color); font-weight: 900;
      background: #fff; outline: none; transition: box-shadow 0.2s, border-color 0.2s;
    }
    .sidebar input:focus { box-shadow: 0 0 0 4px rgba(63, 111, 255, 0.12); border-color: rgba(63, 111, 255, 0.35); }
    .btn {
      width: 100%; margin-top: auto; padding: 12px 14px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--mae-green), var(--mae-blue)); 
      color: white; font-weight: 1000; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 24, 40, 0.06); }

    @media (max-width: 980px) {
      .layout-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="navbar"></div>
  <script>
    fetch('../components/navbar.html')
      .then(res => {
        if (!res.ok) throw new Error("Navbar file not found");
        return res.text();
      })
      .then(data => {
        document.getElementById('navbar').innerHTML = data;
        const pageTitle = document.getElementById("pageTitle");
        if(pageTitle) pageTitle.textContent = "Virtual Circuit Lab";
      })
      .catch(err => console.warn("Navbar skipped (local or path issue):", err));
  </script>

  <main class="container" id="top">
    <div class="header">
      <h2>Virtual Circuit Lab</h2>
      <p>Drag components • Connect terminals • Edit values dynamically</p>
    </div>

    <div class="layout-grid">
      <div class="workspace" id="workspace">
        <svg id="wireCanvas"></svg>
      </div>

      <div class="sidebar">
        <h3 class="colHead">Properties</h3>
        <div id="noSel" style="font-size:12px; font-weight:800; color:rgba(9, 16, 42, 0.55);">
          Select a component to edit its values.
        </div>
        
        <div id="propForm" style="display:none; flex-direction:column; gap:16px;">
          <div>
            <label>Designator</label>
            <input type="text" id="pName" autocomplete="off">
          </div>
          <div>
            <label>Value</label>
            <input type="number" id="pVal" step="any" autocomplete="off">
          </div>
          <div>
            <label>Unit</label>
            <input type="text" id="pUnit" autocomplete="off">
          </div>
        </div>

        <button class="btn" id="clearBtn">Clear All Wires</button>
      </div>
    </div>
  </main>

  <div id="footer"></div>
  <script>
    fetch('../components/footer.html')
      .then(res => {
        if (!res.ok) throw new Error("Footer file not found");
        return res.text();
      })
      .then(data => {
        document.getElementById('footer').innerHTML = data;
        const y = document.getElementById('year');
        if (y) y.textContent = new Date().getFullYear();
      })
      .catch(err => console.warn("Footer skipped (local or path issue):", err));
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const workspace = document.getElementById('workspace');
      const svgCanvas = document.getElementById('wireCanvas');
      
      let selectedId = null;
      let isWiring = false;
      let activeLine = null;
      let startTerm = null;
      let draggedNode = null;
      let offset = {x:0, y:0};
      let wires = [];

      let comps = [
        { id: 'src1', name: 'DC Source', val: 12, unit: 'V', x: 20, y: 50, w: 100, h: 70, t: [{id:'t1',x:20,y:70}, {id:'t2',x:80,y:70}] },
        { id: 'src2', name: 'Func Gen', val: 50, unit: 'Hz', x: 20, y: 150, w: 100, h: 70, t: [{id:'t3',x:20,y:70}, {id:'t4',x:80,y:70}] },
        { id: 'dmm', name: 'Multimeter', val: 0, unit: 'V', x: 200, y: 50, w: 100, h: 70, t: [{id:'t5',x:20,y:70}, {id:'t6',x:80,y:70}] },
        { id: 'osc', name: 'Oscilloscope', val: 0, unit: 'ms', x: 350, y: 50, w: 140, h: 70, t: [{id:'t7',x:20,y:70}, {id:'t8',x:60,y:70}, {id:'t9',x:100,y:70}] },
        
        { id: 'r1', name: 'R1', val: 200, unit: 'Ω', x: 200, y: 200, w: 80, h: 50, t: [{id:'t11',x:-7,y:25}, {id:'t12',x:80,y:25}] },
        { id: 'r2', name: 'R2', val: 330, unit: 'Ω', x: 320, y: 200, w: 80, h: 50, t: [{id:'t13',x:-7,y:25}, {id:'t14',x:80,y:25}] },
        { id: 'c1', name: 'C1', val: 20, unit: 'µF', x: 200, y: 300, w: 80, h: 50, t: [{id:'t15',x:-7,y:25}, {id:'t16',x:80,y:25}] },
        { id: 'l1', name: 'L1', val: 0.2, unit: 'mH', x: 320, y: 300, w: 80, h: 50, t: [{id:'t17',x:-7,y:25}, {id:'t18',x:80,y:25}] }
      ];

      function renderNodes() {
        Array.from(workspace.children).forEach(c => { if(c.tagName !== 'svg') c.remove(); });

        comps.forEach(c => {
          const el = document.createElement('div');
          el.className = `component ${selectedId === c.id ? 'selected' : ''}`;
          el.id = c.id;
          el.style.left = c.x + 'px'; el.style.top = c.y + 'px';
          el.style.width = c.w + 'px'; el.style.height = c.h + 'px';
          
          el.innerHTML = `<div class="c-title">${c.name}</div><div class="c-val">${c.val} ${c.unit}</div>`;

          c.t.forEach(term => {
            const tEl = document.createElement('div');
            tEl.className = 'terminal';
            tEl.id = term.id;
            tEl.style.left = (term.x - 7) + 'px';
            tEl.style.top = (term.y - 7) + 'px';
            
            tEl.onmousedown = (e) => {
              e.stopPropagation();
              isWiring = true; startTerm = term.id;
              activeLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
              activeLine.setAttribute('class', 'wire wire-active');
              svgCanvas.appendChild(activeLine);
            };
            
            tEl.onmouseup = (e) => {
              e.stopPropagation();
              if(isWiring && startTerm !== term.id) {
                const exists = wires.some(w => (w.a === startTerm && w.b === term.id) || (w.b === startTerm && w.a === term.id));
                if(!exists) wires.push({a: startTerm, b: term.id});
              }
              endWiring();
            };
            el.appendChild(tEl);
          });

          el.onmousedown = (e) => {
            if(e.target.classList.contains('terminal')) return;
            selectedId = c.id;
            renderNodes(); updateForm();
            draggedNode = c;
            offset.x = e.clientX - c.x; offset.y = e.clientY - c.y;
            el.style.zIndex = 100;
          };

          workspace.appendChild(el);
        });
      }

      function drawWires() {
        svgCanvas.innerHTML = '';
        wires.forEach(w => {
          const t1 = document.getElementById(w.a); const t2 = document.getElementById(w.b);
          if(!t1 || !t2) return;
          const r1 = t1.getBoundingClientRect(); const r2 = t2.getBoundingClientRect();
          const wR = workspace.getBoundingClientRect();
          
          const x1 = r1.left - wR.left + 7; const y1 = r1.top - wR.top + 7;
          const x2 = r2.left - wR.left + 7; const y2 = r2.top - wR.top + 7;
          
          const cy = Math.max(y1, y2) + Math.abs(y2 - y1)*0.5 + 40;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('class', 'wire');
          path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${cy}, ${x2} ${cy}, ${x2} ${y2}`);
          svgCanvas.appendChild(path);
        });
      }

      function endWiring() {
        isWiring = false; startTerm = null;
        if(activeLine) { activeLine.remove(); activeLine = null; }
        drawWires();
      }

      window.onmousemove = (e) => {
        const wR = workspace.getBoundingClientRect();
        
        if(isWiring && activeLine) {
          const t1 = document.getElementById(startTerm);
          if(!t1) return;
          const r1 = t1.getBoundingClientRect();
          const x1 = r1.left - wR.left + 7; const y1 = r1.top - wR.top + 7;
          const x2 = e.clientX - wR.left; const y2 = e.clientY - wR.top;
          const cy = Math.max(y1, y2) + Math.abs(y2 - y1)*0.5 + 40;
          activeLine.setAttribute('d', `M ${x1} ${y1} C ${x1} ${cy}, ${x2} ${cy}, ${x2} ${y2}`);
        }

        if(draggedNode) {
          draggedNode.x = Math.max(0, Math.min(e.clientX - offset.x, wR.width - draggedNode.w));
          draggedNode.y = Math.max(0, Math.min(e.clientY - offset.y, wR.height - draggedNode.h));
          const el = document.getElementById(draggedNode.id);
          el.style.left = draggedNode.x + 'px'; el.style.top = draggedNode.y + 'px';
          drawWires();
        }
      };

      window.onmouseup = () => { 
        endWiring(); 
        if(draggedNode) {
          document.getElementById(draggedNode.id).style.zIndex = 10;
          draggedNode = null; 
        }
      };

      const fName = document.getElementById('pName');
      const fVal = document.getElementById('pVal');
      const fUnit = document.getElementById('pUnit');

      function updateForm() {
        const c = comps.find(c => c.id === selectedId);
        if(c) {
          document.getElementById('noSel').style.display = 'none';
          document.getElementById('propForm').style.display = 'flex';
          fName.value = c.name; fVal.value = c.val; fUnit.value = c.unit;
        }
      }

      function syncToComp() {
        if(!selectedId) return;
        const c = comps.find(c => c.id === selectedId);
        c.name = fName.value; c.val = parseFloat(fVal.value) || 0; c.unit = fUnit.value;
        const el = document.getElementById(c.id);
        el.querySelector('.c-title').innerText = c.name;
        el.querySelector('.c-val').innerText = `${c.val} ${c.unit}`;
      }

      fName.oninput = syncToComp; fVal.oninput = syncToComp; fUnit.oninput = syncToComp;
      document.getElementById('clearBtn').onclick = () => { wires = []; drawWires(); };

      renderNodes(); drawWires();
    });
  </script>
</body>
</html>
