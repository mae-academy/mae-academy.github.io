<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAE Academy — Linear Algebra</title>

  <link rel="icon" type="image/svg+xml" href="../../assets/favicon-16.svg">
  
  <!-- Math Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/mathjs@11.12.0/lib/browser/math.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">

  <!-- Styling -->
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Navigation -->
  <div id="navbar"></div>
  <script>
    fetch('../components/navbar.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('navbar').innerHTML = data;
        document.getElementById("pageTitle").textContent = "Linear Algebra Simulator";
      });
  </script>

  <!-- Main Application -->
  <main>
    <div class="container">
      <!-- Header -->
      <div class="headRow reveal">
        <div>
          <h2>Linear Algebra Solver</h2>
          <div class="sub">Professional matrix engine with step-by-step solutions</div>
        </div>
      </div>

      <!-- Application Grid -->
      <div class="app-grid reveal">
        
        <!-- Left Sidebar: Controls -->
        <div class="sidebar">
          <div class="card">
            <h2>Operations</h2>
            <div class="tabs" id="tabs"></div>
            <div class="pad">
              <p class="sectionTitle">Quick Actions</p>
              <div class="quick-buttons">
                <button class="btn-small" onclick="window.clearAllMatrices()">Clear All</button>
                <button class="btn-small" onclick="window.exportResults()">Export Results</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Content: Operation Panel + Output -->
        <div class="content-area">
          <div class="card operation-card">
            <div class="pad" id="panelBody">
              <!-- Operations render here -->
            </div>
          </div>

          <div class="card output-card">
            <h2>Results</h2>
            <div class="output-panel" id="output">
              Ready ✅
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer"></div>
  <script>
    fetch('../components/footer.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
        const y = document.getElementById('year');
        if (y) y.textContent = new Date().getFullYear();
      });
  </script>

  <!-- Scripts -->
  <script src="../../js/global.js"></script>
  <script src="script-new.js"></script>
</body>

</html>
